<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Donut Man and His World</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=IM+Fell+English:ital@0;1&family=Cormorant+Garamond:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --grad: linear-gradient(
          to right,
          #ff9eb5,
          #f4826a,
          #1b2a6b,
          #8b3a8f,
          #1b2a6b,
          #f4826a,
          #ff9eb5
        );
        --grad-v: linear-gradient(
          to bottom,
          #ff9eb5,
          #f4826a,
          #1b2a6b,
          #8b3a8f,
          #1b2a6b,
          #f4826a,
          #ff9eb5
        );
        --left-w: clamp(60px, 10vw, 140px);
      }

      html,
      body {
        height: 100%;
        background: #dde3ea;
      }

      body {
        min-height: 100vh;
        font-family: "Cormorant Garamond", serif;
        display: flex;
        flex-direction: column;
      }

      .h-line {
        width: 100%;
        height: 3px;
        background: var(--grad);
        flex-shrink: 0;
      }

      .v-line {
        width: 3px;
        flex-shrink: 0;
        align-self: stretch;
        background: var(--grad-v);
      }

      .page {
        flex: 1 1 auto;
        display: flex;
        flex-direction: row;
        min-height: 0;
      }

      /* ── LEFT COLUMN ── */
      .left-col {
        flex: 0 0 var(--left-w);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding: 10px 8px;
        gap: 6px;
        background: #d4dbe3;
      }

      .left-a-blog-by {
        writing-mode: vertical-rl;
        transform: rotate(180deg);
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(8px, 1vw, 36px);
        font-weight: 700;
        letter-spacing: 0.2em;
        color: #0b0d0f;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .left-author {
        writing-mode: vertical-rl;
        transform: rotate(180deg);
        font-family: "IM Fell English", serif;
        font-size: clamp(11px, 1.4vw, 36px);
        font-style: italic;
        color: #5a6472;
        letter-spacing: 0.04em;
        white-space: nowrap;
      }

      .left-nav {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
        width: 100%;
        margin-top: 2px;
      }

      .left-nav a {
        writing-mode: vertical-rl;
        transform: rotate(180deg);
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(9px, 1.1vw, 13px);
        letter-spacing: 0.51rem;
        text-transform: uppercase;
        color: #7a8694;
        text-decoration: none;
        padding: 14px 0;
        white-space: nowrap;
        transition: color 0.2s;
      }

      .left-nav a:hover,
      .left-nav a.active {
        color: #8b3a8f;
      }

      /* ── RIGHT SIDE ── */
      .right-col {
        flex: 1 1 auto;
        display: flex;
        flex-direction: column;
        min-width: 0;
        background: #e8ecf1;
      }

      .title-col {
        display: flex;
        flex-wrap: nowrap;
        align-items: baseline;
        overflow: hidden;
        padding: clamp(8px, 1.5vw, 16px) clamp(14px, 3vw, 32px);
        background: #e8ecf1;
      }

      .word-donut {
        font-family: "Playfair Display", serif;
        font-size: clamp(28px, 5.5vw, 64px);
        font-weight: 900;
        color: #2a2a2a;
        line-height: 1;
        letter-spacing: -0.02em;
      }

      .word-man {
        font-family: "IM Fell English", serif;
        font-size: clamp(22px, 4vw, 48px);
        font-weight: 400;
        color: #4a5560;
        line-height: 1;
        margin-left: clamp(8px, 1.5vw, 18px);
        letter-spacing: 0.04em;
      }

      .connector {
        font-family: "IM Fell English", serif;
        font-size: clamp(11px, 1.6vw, 20px);
        font-style: italic;
        color: #8b3a8f;
        letter-spacing: 0.08em;
        margin: 0 clamp(8px, 1.2vw, 14px);
        align-self: center;
        transform: rotate(-90deg);
      }

      .connector::before,
      .connector::after {
        content: "~";
        font-size: 0.6em;
        opacity: 0.5;
        vertical-align: middle;
        margin: 0 3px;
      }

      .word-his {
        font-family: "Playfair Display", serif;
        font-size: clamp(16px, 3vw, 38px);
        font-style: italic;
        color: #6a7580;
        letter-spacing: 0.02em;
      }

      .word-world {
        font-family: "Playfair Display", serif;
        font-size: clamp(24px, 4.5vw, 58px);
        font-weight: 700;
        color: #2a2a2a;
        letter-spacing: clamp(0.04em, 8vw, 19rem);
        text-transform: uppercase;
        margin-top: 0;
        margin-left: clamp(10px, 2vw, 28px);
      }

      /* ── CONTENT ── */
      main {
        flex: 1 1 auto;
        padding: 24px clamp(14px, 3vw, 32px);
        background: #e8ecf1;
      }

      .section-wrap {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .card {
        padding: 16px;
        background-color: #f2f4f7;
        border-radius: 6px;
        box-shadow: 0 2px 8px rgba(100, 115, 130, 0.12);
      }

      .card-pinned {
        border-left: 3px solid #8b3a8f;
        padding-left: 13px;
        background-color: #ede8f5;
      }

      .card-date {
        font-family: "Cormorant Garamond", serif;
        font-size: 11px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #8a96a3;
      }

      .card-title {
        font-family: "Playfair Display", serif;
        font-size: clamp(16px, 2vw, 22px);
        font-weight: 700;
        color: #2a2a2a;
        margin: 4px 0 6px;
      }

      .card-title a {
        color: inherit;
        text-decoration: none;
      }
      .card-title a:hover {
        color: #8b3a8f;
      }

      .card-summary {
        font-family: "Cormorant Garamond", serif;
        font-size: 18px;
        color: #090d11;
        line-height: 1.6;
      }

      .card-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 8px;
      }

      .tag {
        font-size: 10px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: #8b3a8f;
        border: 1px solid #b8a0c0;
        padding: 2px 7px;
        border-radius: 2px;
      }

      .empty {
        color: #8a96a3;
        font-style: italic;
        padding: 20px 0;
      }

      /* ── FOOTER ── */
      footer {
        height: 44px;
        flex-shrink: 0;
      }

      @media (max-width: 480px) {
        :root {
          --left-w: 38px;
        }
        .left-nav a {
          font-size: 9px;
        }
      }
    </style>
  </head>
  <body>
    <div class="h-line"></div>

    <div class="page">
      <div class="left-col">
        <span class="left-a-blog-by">A portfolio by</span>
        <span class="left-author">joseph d'amato</span>
        <nav class="left-nav" id="left-nav"></nav>
      </div>

      <div class="v-line"></div>

      <div class="right-col">
        <div class="title-col">
          <span class="word-donut">Donut</span>
          <span class="word-man">Man</span>
          <span class="connector">and</span>
          <span class="word-his">His</span>
          <span class="word-world">World</span>
        </div>

        <div class="h-line"></div>
        <main id="content-area"></main>
      </div>
    </div>

    <div class="h-line"></div>
    <footer></footer>
    <div class="h-line"></div>

    <script>
      // ── ADD / REMOVE / RENAME sections here ──
      const NAV_LINKS = [
        { label: "Blog", id: "blog" },
        { label: "Projects", id: "projects" },
        { label: "Documentation", id: "documentation" },
      ];

      // ── Path to your data file ──
      const JSON_PATH = "content.json";

      const navEl = document.getElementById("left-nav");
      const mainEl = document.getElementById("content-area");
      let DATA = null;

      // ── One renderer per section type ──
      const renderers = {
        blog(entries) {
          const sorted = [...entries].sort(
            (a, b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0),
          );
          return sorted
            .map(
              (e) => `
    <article class="card${e.pinned ? " card-pinned" : ""}">
      <span class="card-date">${e.pinned ? "📌 " : ""}${e.date}</span>
      <h2 class="card-title">${e.title}</h2>
      <p class="card-summary">${e.summary}</p><p>${e.body}</p>
      <div class="card-tags">${(e.tags || []).map((t) => `<span class="tag">${t}</span>`).join("")}</div>
    </article>`,
            )
            .join("");
        },
        projects(entries) {
          return entries
            .map(
              (e) => `
        <article class="card">
          <span class="card-date">${e.date} — <em>${e.status}</em></span>
          <h2 class="card-title">${e.link ? `<a href="${e.link}" target="_blank">${e.title}</a>` : e.title}</h2>
          <p class="card-summary">${e.summary}</p>
          <div class="card-tags">${(e.tags || []).map((t) => `<span class="tag">${t}</span>`).join("")}</div>
        </article>`,
            )
            .join("");
        },
        documentation(entries) {
          return entries
            .map(
              (e) => `
        <article class="card">
          <span class="card-date">v${e.version} — ${e.date}</span>
          <h2 class="card-title">${e.link ? `<a href="${e.link}" target="_blank">${e.title}</a>` : e.title}</h2>
          <p class="card-summary">${e.summary}</p>
          <div class="card-tags">${(e.tags || []).map((t) => `<span class="tag">${t}</span>`).join("")}</div>
        </article>`,
            )
            .join("");
        },
      };

      // ── Swap content area ──
      function renderSection(id) {
        document
          .querySelectorAll(".left-nav a")
          .forEach((a) => a.classList.toggle("active", a.dataset.id === id));
        const section = DATA[id];
        if (!section) {
          mainEl.innerHTML = '<p class="empty">Section not found.</p>';
          return;
        }
        const render = renderers[id] || renderers.blog;
        mainEl.innerHTML = `<div class="section-wrap">${render(section.entries || [])}</div>`;
      }

      // ── Build nav from NAV_LINKS ──
      NAV_LINKS.forEach(({ label, id }) => {
        const a = document.createElement("a");
        a.textContent = label;
        a.href = "#" + id;
        a.dataset.id = id;
        a.addEventListener("click", (e) => {
          e.preventDefault();
          renderSection(id);
        });
        navEl.appendChild(a);
      });

      // ── Load JSON, then render first section ──
      fetch(JSON_PATH)
        .then((r) => r.json())
        .then((json) => {
          DATA = json;
          renderSection(NAV_LINKS[0].id);
        })
        .catch(() => {
          mainEl.innerHTML =
            '<p class="empty">Could not load content.json — make sure it sits in the same folder as this file.</p>';
        });
    </script>
  </body>
</html>
